<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Inter:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/page.css" />
  </head>
  <body>

    <header>
      <h1>My To-Do List</h1>
    </header>

    <main>
      <section class="section-card">
        <div class="section-card-icon">
          <svg class="icon">
            <use href="/icons/status.svg#icon-tasks" />
          </svg>
        </div>

        <div class="section-card-content">
          <h2>Tasks</h2>
          <hr />
          <ul>
            <li><a href="tasks/task-1.html">Complete CSC437 Lab 2</a></li>
            <li><a href="tasks/task-2.html">Buy weekly groceries</a></li>
          </ul>
        </div>
      </section>

      <section class="section-card">
        <div class="section-card-icon">
          <svg class="icon">
            <use href="/icons/status.svg#icon-category" />
          </svg>
        </div>

        <div class="section-card-content">
          <h2>Categories</h2>
          <hr />
          <ul>
            <li><a href="categories/school.html">School</a></li>
            <li><a href="categories/personal.html">Personal</a></li>
          </ul>
        </div>
      </section>

      <section class="section-card">
        <div class="section-card-icon">
          <svg class="icon">
            <use href="/icons/status.svg#icon-status" />
          </svg>
        </div>

        <div class="section-card-content">
          <h2>Statuses</h2>
          <hr />
          <ul>
            <li><a href="statuses/pending.html">Pending</a></li>
            <li><a href="statuses/completed.html">Completed</a></li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
