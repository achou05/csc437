<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Inter:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/reset.css" />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/page.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="site-brand">
        <p class="site-kicker">Task Manager</p>
        <h1>My To-Do List</h1>
      </div>

      <div class="site-header-right">
        <nav class="site-nav" aria-label="Primary">
          <ul>
            <li><a href="/app">Home</a></li>
            <li><a href="/app/about">About</a></li>
          </ul>
        </nav>

        <details class="settings-menu">
          <summary>Settings</summary>
          <div class="settings-panel">
            <p class="site-user" id="site-user">Not signed in</p>
            <label class="dark-mode-toggle">
              <input type="checkbox" autocomplete="off" />
              <span class="theme-switch-track" aria-hidden="true"></span>
              <span class="theme-switch-text">Dark mode</span>
            </label>
            <a class="settings-link" href="/login.html" id="signin-link">Sign In</a>
            <button id="signout-button" type="button">Sign Out</button>
          </div>
        </details>
      </div>
    </header>

    <main class="page-shell">
      <div class="page-main">
        <section>
          <h2>Login</h2>

          <form id="login-form">
            <label>
              <span>Username:</span>
              <input name="username" autocomplete="off" />
            </label>

            <label>
              <span>Password:</span>
              <input type="password" name="password" />
            </label>

            <button type="submit">Login</button>

            <p id="login-error"></p>
          </form>
        </section>
      </div>

      <aside class="page-sidebar">
        <section class="sidebar-card">
          <h2>Account</h2>
          <p>Log in to access protected task data from the API.</p>
        </section>
      </aside>
    </main>

    <script type="module" src="/scripts/login.js"></script>
    <script type="module" src="/scripts/dark-mode.js"></script>
    <script src="/scripts/auth-header.js"></script>
  </body>
</html>
